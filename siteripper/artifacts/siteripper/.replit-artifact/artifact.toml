kind = "web"
previewPath = "/"
title = "SiteRipper"
version = "1.0.0"
id = "artifacts/siteripper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19124

[services.development]
run = "pnpm --filter @workspace/siteripper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/siteripper", "run", "build" ]
publicDir = "artifacts/siteripper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19124"
BASE_PATH = "/"
